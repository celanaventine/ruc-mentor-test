<!DOCTYPE html>

            display: block;
            font-weight: bold;

        }

            width: 100%;

            background-image: none;
            text-transform: uppercase;
        }

            margin: 40px auto 0;
            background-color: #000;
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn-submit:hover { opacity: 0.8; }

        /* 答题区域样式 */
        #quiz-screen, #result-screen {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #222;
        }
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 15px 20px;
            margin-bottom: 12px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;

        .option-btn:hover {

            color: #666;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;

</head>

</div>

        qObj.options.forEach(opt => {
